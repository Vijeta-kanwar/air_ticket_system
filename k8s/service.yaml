apiVersion: v1
kind: Service
metadata:
  name: airticket-booking-service
  namespace: airticket-app
  labels:
    app: airticket-booking-system
spec:
  type: NodePort
  selector:
    app: airticket-booking-system
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: airticket-booking-internal
  namespace: airticket-app
  labels:
    app: airticket-booking-system
spec:
  type: ClusterIP
  selector:
    app: airticket-booking-system
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
