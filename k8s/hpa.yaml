apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: airticket-booking-hpa
  namespace: airticket-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: airticket-booking-system
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
