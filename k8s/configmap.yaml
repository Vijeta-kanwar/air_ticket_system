apiVersion: v1
kind: ConfigMap
metadata:
  name: airticket-app-config
  namespace: airticket-app
  labels:
    app: airticket-booking-system
data:
  application.properties: |
    spring.application.name=airticket-booking-system
    server.port=8080
    spring.datasource.url=jdbc:h2:mem:airticketdb
    spring.jpa.hibernate.ddl-auto=update
    management.endpoints.web.exposure.include=health,info,metrics
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
