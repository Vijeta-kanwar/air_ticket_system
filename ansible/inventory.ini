[local]
localhost ansible_connection=local

[kubernetes_master]
k8s-master ansible_host=127.0.0.1 ansible_connection=local

[docker_hosts]
docker-host ansible_host=127.0.0.1 ansible_connection=local

[all:vars]
ansible_python_interpreter=/usr/bin/python3
app_name=airticket-booking-system
app_port=8080
docker_image=airticket-booking-system
image_tag=latest
