---
# ===================================================================
# Ansible Playbook: Install DevOps Prerequisites
# Description: Sets up Docker, kubectl, Java, Maven on target hosts
# ===================================================================

- name: Install DevOps Toolchain Prerequisites
  hosts: all
  become: yes
  gather_facts: yes

  tasks:

    - name: Update apt cache (Debian/Ubuntu)
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
          - lsb-release
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Java 17
      apt:
        name: openjdk-17-jdk
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Maven
      apt:
        name: maven
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker repository
      apt_repository:
        repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
      when: ansible_os_family == "Debian"

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add current user to docker group
      user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes

    - name: Download kubectl binary
      get_url:
        url: "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Verify installations
      shell: |
        echo "==== Java ===="
        java -version
        echo "==== Maven ===="
        mvn -version
        echo "==== Docker ===="
        docker --version
        echo "==== Kubectl ===="
        kubectl version --client
      register: tools_check
      changed_when: false

    - name: Display tool versions
      debug:
        var: tools_check.stdout_lines
