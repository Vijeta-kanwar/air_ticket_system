---
# ===================================================================
# Ansible Playbook: Deploy Air Ticket Booking System
# Author: DevOps Team
# Description: Automates Docker build, image push, and K8s deployment
# ===================================================================

- name: Deploy Air Ticket Booking System
  hosts: localhost
  become: yes
  gather_facts: yes

  vars:
    app_name: "airticket-booking-system"
    docker_image: "airticket-booking-system"
    image_tag: "{{ image_tag | default('latest') }}"
    docker_registry: "docker.io/yourdockerhubuser"
    k8s_namespace: "airticket-app"
    project_dir: "{{ playbook_dir }}/.."

  tasks:

    # ============================================================
    # PHASE 1: Pre-deployment Checks
    # ============================================================
    - name: "[Phase 1] Display deployment information"
      debug:
        msg:
          - "Starting deployment of {{ app_name }}"
          - "Image: {{ docker_registry }}/{{ docker_image }}:{{ image_tag }}"
          - "Target Namespace: {{ k8s_namespace }}"

    - name: "[Phase 1] Check if Docker is installed"
      command: docker --version
      register: docker_version
      changed_when: false
      failed_when: docker_version.rc != 0

    - name: "[Phase 1] Check if kubectl is installed"
      command: kubectl version --client
      register: kubectl_version
      changed_when: false
      failed_when: kubectl_version.rc != 0

    - name: "[Phase 1] Display tool versions"
      debug:
        msg:
          - "Docker: {{ docker_version.stdout }}"
          - "Kubectl: {{ kubectl_version.stdout_lines[0] }}"

    # ============================================================
    # PHASE 2: Build Docker Image
    # ============================================================
    - name: "[Phase 2] Build Docker image"
      command: >
        docker build
        -t {{ docker_image }}:{{ image_tag }}
        -t {{ docker_image }}:latest
        {{ project_dir }}
      register: docker_build
      changed_when: "'Successfully built' in docker_build.stdout or 'writing image' in docker_build.stderr"

    - name: "[Phase 2] Tag image for registry"
      command: >
        docker tag {{ docker_image }}:{{ image_tag }}
        {{ docker_registry }}/{{ docker_image }}:{{ image_tag }}

    - name: "[Phase 2] List Docker images"
      command: docker images {{ docker_image }}
      register: docker_images
      changed_when: false

    - name: "[Phase 2] Display Docker images"
      debug:
        var: docker_images.stdout_lines

    # ============================================================
    # PHASE 3: Push Docker Image
    # ============================================================
    - name: "[Phase 3] Push Docker image to registry"
      command: docker push {{ docker_registry }}/{{ docker_image }}:{{ image_tag }}
      register: docker_push
      ignore_errors: yes

    - name: "[Phase 3] Display push status"
      debug:
        msg: "Image push completed: {{ docker_push.rc == 0 }}"

    # ============================================================
    # PHASE 4: Kubernetes Deployment
    # ============================================================
    - name: "[Phase 4] Create Kubernetes namespace"
      command: kubectl apply -f {{ project_dir }}/k8s/namespace.yaml
      register: ns_result
      changed_when: "'created' in ns_result.stdout"

    - name: "[Phase 4] Apply ConfigMap"
      command: kubectl apply -f {{ project_dir }}/k8s/configmap.yaml -n {{ k8s_namespace }}
      register: cm_result
      changed_when: "'created' in cm_result.stdout or 'configured' in cm_result.stdout"

    - name: "[Phase 4] Deploy application to Kubernetes"
      command: kubectl apply -f {{ project_dir }}/k8s/deployment.yaml -n {{ k8s_namespace }}
      register: deploy_result
      changed_when: "'created' in deploy_result.stdout or 'configured' in deploy_result.stdout"

    - name: "[Phase 4] Apply Kubernetes service"
      command: kubectl apply -f {{ project_dir }}/k8s/service.yaml -n {{ k8s_namespace }}
      register: svc_result
      changed_when: "'created' in svc_result.stdout or 'configured' in svc_result.stdout"

    - name: "[Phase 4] Apply HorizontalPodAutoscaler"
      command: kubectl apply -f {{ project_dir }}/k8s/hpa.yaml -n {{ k8s_namespace }}
      register: hpa_result
      ignore_errors: yes
      changed_when: "'created' in hpa_result.stdout or 'configured' in hpa_result.stdout"

    # ============================================================
    # PHASE 5: Verify Deployment
    # ============================================================
    - name: "[Phase 5] Wait for deployment to be ready"
      command: >
        kubectl rollout status deployment/{{ app_name }}
        -n {{ k8s_namespace }} --timeout=300s
      register: rollout_status
      changed_when: false

    - name: "[Phase 5] Get pod status"
      command: kubectl get pods -n {{ k8s_namespace }}
      register: pod_status
      changed_when: false

    - name: "[Phase 5] Display pod status"
      debug:
        var: pod_status.stdout_lines

    - name: "[Phase 5] Get service info"
      command: kubectl get svc -n {{ k8s_namespace }}
      register: svc_info
      changed_when: false

    - name: "[Phase 5] Display service info"
      debug:
        var: svc_info.stdout_lines

    # ============================================================
    # PHASE 6: Final Summary
    # ============================================================
    - name: "[Phase 6] Deployment summary"
      debug:
        msg:
          - "================================================="
          - "  ✅ Deployment Completed Successfully!"
          - "================================================="
          - "  Application: {{ app_name }}"
          - "  Image Tag:   {{ image_tag }}"
          - "  Namespace:   {{ k8s_namespace }}"
          - "  Access URL:  http://<NODE-IP>:30080"
          - "================================================="
